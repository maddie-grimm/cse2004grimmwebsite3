<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Select the race and driver for the F1 strategy simulator.">
  <title>F1 Strategy Simulator | Setup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"><div class="nav-wrap"><a class="logo" href="index.html">F1 Strategy Simulator</a><button class="menu-btn" type="button">☰</button><nav class="nav-links"><a href="index.html">Home</a><a class="active" href="setup.html">Setup</a><a href="simulator.html">Simulator</a><a href="compare.html">Compare</a></nav></div></header>

  <main class="container two-col">
    <section class="panel">
      <div class="panel-header"><div><div class="kicker">Race setup</div><h2>Select your starting point</h2></div></div>
      <div class="form-row"><label for="seasonSelect">Season</label><select id="seasonSelect"><option value="2025">2025</option><option value="2024">2024</option></select></div>
      <div class="form-row"><label for="raceSelect">Grand Prix</label><select id="raceSelect"><option>Loading races...</option></select></div>
      <div class="form-row"><label for="driverSelect">Driver</label><select id="driverSelect"><option>Loading drivers...</option></select></div>
      <p class="api-note" id="apiStatus">Connecting to F1 API...</p>
      <a class="btn red" href="simulator.html" id="saveSetup">Continue to Simulator</a>
    </section>

    <section>
      <div class="panel">
        <div class="panel-header"><div><div class="kicker">Preview</div><h2 id="raceName">Race Name</h2><p id="raceRound">This area updates when the dropdowns change.</p></div></div>
        <div class="track-image-card"><img src="albert-park-circuit-card.webp" alt="Albert Park circuit map preview"></div>
        <div class="info-list"><div class="info-box"><span>Location</span><strong id="raceLocation">---</strong></div><div class="info-box"><span>Date</span><strong id="raceDate">---</strong></div><div class="info-box"><span>Circuit</span><strong id="raceTrack">---</strong></div><div class="info-box"><span>Driver</span><strong id="raceDriver">---</strong></div></div>
      </div>

    </section>
  </main>
  <footer class="footer">F1 Strategy Simulator — Race Setup</footer>
  <script src="app.js"></script>
</body>
</html>
